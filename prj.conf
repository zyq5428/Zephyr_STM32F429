# 开启启动横幅（Zephyr 版本信息）
CONFIG_BOOT_BANNER=y

#
# Kernel & System (内核与系统基础)
#
# 定义系统时钟滴答的频率
CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000
# 启用 Newlib C 库
CONFIG_NEWLIB_LIBC=y
# 开启 Zephyr 的输入子系统
CONFIG_INPUT=y
# 开启硬件浮点单元支持
CONFIG_FPU=y
# 开启 FPU 寄存器共享 (非常重要！)
# 因为你在线程中使用浮点运算，如果不开启共享，
# 当系统从陀螺仪线程切换到其他线程时，浮点寄存器的值可能会乱套。
CONFIG_FPU_SHARING=y

# 启用Sensor子系统（如果需要连接陀螺仪等传感器）
CONFIG_SENSOR=y

#
# 控制台
#
# --- 基础控制台支持 ---
CONFIG_CONSOLE=y
# 启用控制台输入处理,既然用了 Shell，就不需要原始的控制台处理器了
CONFIG_CONSOLE_HANDLER=n
# 控制台最大输入行长度
CONFIG_CONSOLE_INPUT_MAX_LINE_LEN=128
# 启用标准输出重定向到控制台，允许 printf 等通过控制台(此时是 Shell)输出
# CONFIG_STDOUT_CONSOLE=y
# 指定 UART 作为控制台设备,不要让 Console 直接写 UART，而是交给 Shell 统一管
CONFIG_UART_CONSOLE=n

#
# Subsystems: Shell and Console (外壳与控制台)
#
# 启用 Shell 子系统
CONFIG_SHELL=y
# 启用 Shell 后端支持
CONFIG_SHELL_BACKENDS=y
# 使用串口作为 Shell 的 I/O 接口
CONFIG_SHELL_BACKEND_SERIAL=y
# 这一行是关键！它会让 Shell 注册为系统的一个 Console 驱动
CONFIG_SHELL_BACKEND_SERIAL_INTERRUPT_DRIVEN=y
# 解决争抢：让 Shell 接管日志后端输出
CONFIG_SHELL_LOG_BACKEND=y
# 启用 UART 运行时配置更改
CONFIG_UART_USE_RUNTIME_CONFIGURE=y
# 增加 Shell 线程栈大小以确保稳定运行
CONFIG_SHELL_STACK_SIZE=2048
# 开启内核对象查询（必须）
CONFIG_THREAD_MONITOR=y
# 开启线程名显示（方便识别是哪个任务）
CONFIG_THREAD_NAME=y
# 开启栈分析功能（查看具体使用了百分之几）
CONFIG_THREAD_STACK_INFO=y
CONFIG_THREAD_ANALYZER=y

#
# Logging System (日志系统)
#
# 启用核心日志功能
CONFIG_LOG=y
# 强制日志立即同步输出，不要缓存
CONFIG_LOG_MODE_IMMEDIATE=y
# 启用延迟模式（使用队列，提高实时性能）
# CONFIG_LOG_MODE_DEFERRED=y
# 使用 UART 作为日志输出后端;禁用原生的日志 UART 后端（避免重复）
CONFIG_LOG_BACKEND_UART=n
# 默认日志级别设置为 Info (3)
CONFIG_LOG_DEFAULT_LEVEL=3
# 编译时包含的最大日志级别设置为 Debug (4)
CONFIG_LOG_MAX_LEVEL=4
# 增加打印延迟，防止刷屏导致系统假死,只有在“延迟模式”下才有效
# CONFIG_LOG_BUFFER_SIZE=2048

#
# Core Drivers: Serial/UART (核心驱动：串行/UART)
#
# 启用串行子系统
CONFIG_SERIAL=y
# 启用中断驱动模式 (高效)
CONFIG_UART_INTERRUPT_DRIVEN=y

# 启用浮点支持，以便在日志中打印浮点数
CONFIG_CBPRINTF_FP_SUPPORT=y

# 启用 DMA 核心支持
# CONFIG_DMA=y

# 启用 PWM
# CONFIG_PWM=y
# CONFIG_PWM_STM32=y

#
# Core Drivers: GPIO (通用输入/输出)
#
# 启用 GPIO 核心支持
CONFIG_GPIO=y
# 启用 STM32 硬件 GPIO 驱动
CONFIG_GPIO_STM32=y

#
# Core Drivers: I2C
#
# 启用 I2C 核心支持
CONFIG_I2C=y
# 开启软件模拟 I2C 驱动
# CONFIG_I2C_GPIO=y
# 启用 STM32 硬件 I2C 驱动
CONFIG_I2C_STM32=y
# 启用中断驱动模式
CONFIG_I2C_STM32_INTERRUPT=y

#
# Core Drivers: QSPI/Flash (W25Q128)
#
# 启用 Flash API 核心支持
# CONFIG_FLASH=y
# 启用使用 STM32 HAL 库实现的 QSPI 驱动
# CONFIG_FLASH_STM32_QSPI=y

#
# Core Drivers: Standard SPI
#
# 启用标准 SPI 核心支持 (如果需要连接 SPI 传感器/屏幕)
CONFIG_SPI=y
CONFIG_SPI_STM32=y
# 暂时关闭 SPI DMA 传输，强制使用轮询/中断模式
# CONFIG_SPI_STM32_DMA=n
# 启用 SPI DMA 传输
# CONFIG_SPI_STM32_DMA=y
# 建议开启日志以便调试
# CONFIG_SPI_LOG_LEVEL_DBG=y

#
# Core Drivers: RTC (实时时钟)
#
# 启用 RTC 核心支持
CONFIG_RTC=y
# 启用 STM32 硬件 RTC 驱动
CONFIG_RTC_STM32=y
# 启用 RTC 闹钟功能
CONFIG_RTC_ALARM=y

#
# Core Drivers: LED (发光二极管)
#
# 启用 LED 核心驱动框架
CONFIG_LED=y
# 启用 GPIO LED 驱动 (用于开关控制)
CONFIG_LED_GPIO=y
# 启用 PWM LED 驱动 (用于亮度调节)
# CONFIG_LED_PWM=y

#
# Core Drivers: ADC (模数转换器)
#
# 启用 ADC 核心支持
CONFIG_ADC=y
# 启用 STM32 硬件 ADC 驱动
CONFIG_ADC_STM32=y

#
# Core Drivers: Pin Controller and HW Info (引脚控制器与硬件信息)
#
# 启用引脚控制器核心支持
CONFIG_PINCTRL=y
# 启用 STM32 引脚控制器驱动
CONFIG_PINCTRL_STM32=y
# 启用硬件信息核心支持
CONFIG_HWINFO=y
# 启用 STM32 硬件信息驱动 (读取芯片ID等)
CONFIG_HWINFO_STM32=y

#
# Display Driver (显示驱动 - LCD)
#
# 启用显示子系统
CONFIG_DISPLAY=y

# ================================================================
# LVGL配置
# ================================================================

# ================================================================
# LVGL 核心启用与内存池
# ================================================================
CONFIG_LVGL=y

# LVGL初始化会复用main stack，因此需要增加 main stack size
CONFIG_MAIN_STACK_SIZE=4096

# LVGL 自身组件分配的内存池大小（用于对象、样式等）
# 建议设置在 16KB - 64KB，取决于 UI 复杂度
CONFIG_LV_Z_MEM_POOL_SIZE=32768

# ================================================================
# LVGL 显存 (VDB) 关键配置 (实现双缓冲与地址重定向)
# ================================================================

# 渲染缓冲区大小：100 代表 100%，即全屏缓冲区
# 对于 F429 + SDRAM，建议设为 100 以获得最佳抗撕裂效果
CONFIG_LV_Z_VDB_SIZE=100

# 启用双显示缓冲区 (Double Buffering)
# 开启后 LVGL 会创建两个缓冲区，彻底解决你看到的“横向闪烁线”
CONFIG_LV_Z_DOUBLE_VDB=y

# 开启全屏刷新
CONFIG_LV_Z_FULL_REFRESH=y

# 显存位置重定向 (使用 Memory Region 模式)
# 开启内存域放置功能，允许我们指定显存放在特定的内存区域（如 SDRAM）
CONFIG_LV_Z_VDB_ZEPHYR_REGION=y
# 指定设备树中的 SDRAM2 区域
CONFIG_LV_Z_VDB_ZEPHYR_REGION_NAME="SDRAM2"

# 性能加速
# 启用 STM32 DMA2D 硬件加速
CONFIG_LV_USE_DRAW_DMA2D=y

# 2. 【核心修复】显式指定 HAL 库头文件为 F4 系列
# 注意：这行解决了报错 stm32h7xx_hal.h 找不到的问题
CONFIG_LV_DRAW_DMA2D_HAL_INCLUDE="stm32f4xx_hal.h"

# ================================================================
# 其他建议（可选）
# ================================================================
# 如果你需要使用中文字库或复杂的图形，可以增加 LVGL 的内存
CONFIG_LV_FONT_MONTSERRAT_14=y
CONFIG_LV_FONT_MONTSERRAT_18=y
CONFIG_LV_FONT_MONTSERRAT_24=y
CONFIG_LV_FONT_MONTSERRAT_32=y
# 开启用户log输出，方便调试LVGL内部状态
# CONFIG_LV_USE_LOG=y
# 开启LVGL Demo
# CONFIG_LV_BUILD_DEMOS=y
# 开启基础控件 Demo
# CONFIG_LV_USE_DEMO_WIDGETS=y
# 开启基准测试 Demo
# CONFIG_LV_USE_DEMO_BENCHMARK=y
# 智能手表 Demo
# CONFIG_LV_USE_DEMO_SMARTWATCH=y
